# Rokit toolchain — pins Rojo (build) + Mantle (publish, kept for legacy).
# Mantle's `import` is broken upstream (issue #243); we use scripts/publish.sh
# (Open Cloud API) for actual deploys, but Mantle stays here in case future
# upstream releases revive it.

[tools]
rojo = "rojo-rbx/rojo@7.6.1"
mantle = "blake-mealey/mantle@0.11.18"
